repos:

-   repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
    -   id: black
        types: [python]
        args: ["--config", "pyproject.toml"]

-   repo: https://github.com/pycqa/isort
    rev: 9.0.0b1
    hooks:
    -   id: isort
        name: isort (python)
        args: ["--settings-path", "pyproject.toml"]