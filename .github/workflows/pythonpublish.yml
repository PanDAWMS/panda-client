name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install hatch twine build
        python -m pip list

    - name: Build panda-client sdist and panda-client-light wheel
      run: |
        # panda-client sdist from the root pyproject.toml (hatchling)
        python -m build -s
        # swap the root pyproject.toml for the light config and build the
        # panda-client-light wheel (overwrites the working-copy pyproject.toml,
        # which is harmless in CI and restored on the next checkout)
        cp packages/light/pyproject.toml pyproject.toml
        hatch build -t wheel

    - name: Verify the distribution
      run: twine check dist/*

    - name: Publish distribution to PyPI
      if: github.event_name == 'release' && github.event.action == 'published' && github.repository == 'PanDAWMS/panda-client'
      uses: pypa/gh-action-pypi-publish@release/v1
